[tools]
rust = { version = "1.95.0", components = "rustfmt,clippy" }
zig = "0.14.1"

[env]
_.path = ["./target/debug", "./target/release"]

[tasks.build]
description = "Build release binary"
run = "cargo build --release"

[tasks.test]
description = "Run unit tests"
run = "cargo test"

[tasks.check]
description = "Format, lint, and test"
run = [
  "cargo fmt --all -- --check",
  "cargo clippy --all-targets -- -D warnings",
  "cargo test",
]

[tasks.check-linux]
description = "Same checks as CI on ubuntu-latest (requires Docker)"
run = "docker run --rm -v $PWD:/app -w /app rust:1.95.0 bash -c 'rustup component add rustfmt clippy && cargo fmt --all -- --check && cargo clippy --all-targets -- -D warnings && cargo test'"

[tasks.dev]
description = "Run supersurfer CLI (pass args after --)"
run = "cargo run --"

[tasks.doctor]
description = "Show detected browsers and config status"
run = "cargo run -- doctor"

[tasks.package-macos]
description = "Build SuperSurfer.app bundle"
run = "bash packaging/macos/build-app.sh"

[tasks.register]
description = "Register SuperSurfer.app as default browser (macOS)"
run = "/Applications/SuperSurfer.app/Contents/MacOS/SuperSurfer register"

[tasks.package-windows]
description = "Build supersurfer.exe into dist/ (native on Windows, cross-compile elsewhere)"
run = "bash packaging/windows/build.sh"

[tasks.package-linux]
description = "Build Linux binary + .desktop + install.sh into dist/linux"
run = "bash packaging/linux/build.sh"

[tasks.package-linux-arm]
description = "Cross-compile Linux ARM64 binary + packaging (requires zig)"
run = "bash packaging/linux/build-cross.sh"
